  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f99450cd-de69-4020-88aa-ba0e6da661d8\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{font-family:'Segoe UI',system-ui,-apple-system,'Noto Sans','Helvetica Neue',sans-serif;background:#f6fafd;color:#13212e;line-height:1.55;-webkit-text-size-adjust:100%}\n  h1,h2,h3{line-height:1.2;font-weight:800;letter-spacing:-.02em}\n  #mv-tabs::-webkit-scrollbar{display:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"--accent:{{ accent }};background:#f6fafd;min-height:100vh;overflow-x:hidden\">\n  \n\n  <header style=\"position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #dde8f1;box-shadow:0 2px 16px rgba(10,37,64,.05)\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 22px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px\">\n        <button onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:11px;font-weight:800;font-size:1.3rem;color:#0a2540;background:none;border:none;cursor:pointer;font-family:inherit\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 40 40\" fill=\"none\"><circle cx=\"20\" cy=\"20\" r=\"19\" fill=\"#0b5394\"><\u002Fcircle><path d=\"M20 8c5 6 8 10 8 15a8 8 0 11-16 0c0-5 3-9 8-15z\" fill=\"#5bb3e6\"><\u002Fpath><path d=\"M12 24c2 1.5 4 1.5 6 0s4-1.5 6 0 4 1.5 4 0\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span style=\"text-align:left\">MARVI<span style=\"display:block;font-size:.6rem;font-weight:600;color:#566677;letter-spacing:.05em;text-transform:uppercase;margin-top:-2px\">Groundwater · India<\u002Fspan><\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ goGame }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:var(--accent,#c98a3a);color:#fff;padding:10px 18px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;border:none;font-family:inherit;transition:.22s\" style-hover=\"filter:brightness(.93);transform:translateY(-1px)\">▶ Play the game<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"mv-tabs\" style=\"display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:6px 0 0\">\n        <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"8\">\n          <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"min-height:60vh\">\n\n    <!-- ===================== HOME ===================== -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"background:linear-gradient(155deg,#0a2540,#0b5394 60%,#1f7bc4);color:#fff;border-radius:22px;padding:48px 44px;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;width:340px;height:340px;border-radius:50%;filter:blur(55px);opacity:.4;background:#2a8fd8;top:-110px;right:-60px\"><\u002Fdiv>\n        <div style=\"position:absolute;width:260px;height:260px;border-radius:50%;filter:blur(55px);opacity:.5;background:#08406f;bottom:-90px;left:-70px\"><\u002Fdiv>\n        <div style=\"position:relative;z-index:2;max-width:680px\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:6px 14px;border-radius:50px;font-size:.78rem;font-weight:600;letter-spacing:.03em;margin-bottom:18px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#5bb3e6;box-shadow:0 0 0 4px rgba(91,179,230,.3)\"><\u002Fspan> Village-led groundwater management<\u002Fspan>\n          <h1 style=\"font-size:clamp(1.9rem,4.4vw,3rem);margin-bottom:14px\">Managing aquifer recharge, sustaining groundwater — village by village.<\u002Fh1>\n          <p style=\"font-size:clamp(1rem,2vw,1.15rem);color:#d6e8f6;margin-bottom:26px;max-width:560px\">MARVI puts the science of groundwater into the hands of the people who depend on it — farmers, schools, researchers and communities working together for water that lasts.<\u002Fp>\n          <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n            <button onclick=\"{{ goAbout }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:var(--accent,#c98a3a);color:#fff;padding:12px 22px;border-radius:8px;font-weight:700;font-size:.94rem;cursor:pointer;border:none;font-family:inherit;transition:.22s\" style-hover=\"filter:brightness(.92);transform:translateY(-1px)\">About the project<\u002Fbutton>\n            <button onclick=\"{{ goMywell }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);color:#fff;padding:12px 22px;border-radius:8px;font-weight:700;font-size:.94rem;cursor:pointer;border:1px solid rgba(255,255,255,.3);font-family:inherit;transition:.22s\" style-hover=\"background:rgba(255,255,255,.24)\">Explore MyWell<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:22px\">\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px 16px;text-align:center\"><div style=\"font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:800;color:#0b5394;line-height:1;letter-spacing:-.03em\">60<span style=\"color:var(--accent,#c98a3a);font-size:1.1rem\">%<\u002Fspan><\u002Fdiv><div style=\"margin-top:7px;color:#566677;font-weight:600;font-size:.82rem\">of irrigation water is groundwater<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px 16px;text-align:center\"><div style=\"font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:800;color:#0b5394;line-height:1;letter-spacing:-.03em\">80<span style=\"color:var(--accent,#c98a3a);font-size:1.1rem\">%<\u002Fspan><\u002Fdiv><div style=\"margin-top:7px;color:#566677;font-weight:600;font-size:.82rem\">of drinking water is groundwater<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px 16px;text-align:center\"><div style=\"font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:800;color:#0b5394;line-height:1;letter-spacing:-.03em\">30–40<span style=\"color:var(--accent,#c98a3a);font-size:1.1rem\">m<\u002Fspan><\u002Fdiv><div style=\"margin-top:7px;color:#566677;font-weight:600;font-size:.82rem\">watertable depth today (was 10–15m)<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px 16px;text-align:center\"><div style=\"font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:800;color:#0b5394;line-height:1;letter-spacing:-.03em\">2012<\u002Fdiv><div style=\"margin-top:7px;color:#566677;font-weight:600;font-size:.82rem\">active in the field since<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px;margin-top:20px;align-items:stretch\">\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:18px;padding:28px\">\n          <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">India's hidden water crisis<\u002Fspan>\n          <p style=\"color:#3a4b5c;font-size:1rem;margin-bottom:12px\">Groundwater is a hidden resource — poorly understood in terms of how much there is and how it moves. Being underground and hard to control, its use has been largely unregulated, and with cheap pumps everywhere, water is drawn out far faster than the monsoon can recharge it.<\u002Fp>\n          <p style=\"color:#3a4b5c;font-size:1rem;margin:0\">The result: watertables that were 10–15 m deep in the 1960s are now 30–40 m — and some farmers drill past 100 m chasing water. The future of food security depends on turning this around.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(135deg,#0a2540,#0b5394);color:#fff;border-radius:18px;padding:28px;display:flex;flex-direction:column;justify-content:center\">\n          <h3 style=\"font-size:1.2rem;margin-bottom:8px\">The question MARVI set out to answer<\u002Fh3>\n          <p style=\"color:#cfe3f3;font-size:.98rem;margin:0\">How do we bring together the technical, social, economic and policy sides of groundwater to make its use sustainable — while improving livelihoods for village communities?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin:32px 0 4px;font-weight:700;color:#0a2540\">Find what matters to you →<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px\">\n        <button onclick=\"{{ goLearn }}\" style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;font-family:inherit;transition:.25s\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(10,37,64,.1);border-color:#5bb3e6\"><div style=\"width:46px;height:46px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin:0 auto 10px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2.7c3.6 4.6 6.3 7.8 6.3 11.3a6.3 6.3 0 11-12.6 0C5.7 10.5 8.4 7.3 12 2.7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-weight:700;font-size:.9rem;color:#0a2540\">Learn groundwater<\u002Fdiv><\u002Fbutton>\n        <button onclick=\"{{ goBjs }}\" style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;font-family:inherit;transition:.25s\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(10,37,64,.1);border-color:#5bb3e6\"><div style=\"width:46px;height:46px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin:0 auto 10px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v20\"><\u002Fpath><path d=\"M12 7c-3-3-7-2-7-2s-1 4 2 7\"><\u002Fpath><path d=\"M12 11c3-3 7-2 7-2s1 4-2 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-weight:700;font-size:.9rem;color:#0a2540\">Bhujal Jankaars<\u002Fdiv><\u002Fbutton>\n        <button onclick=\"{{ goMywell }}\" style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;font-family:inherit;transition:.25s\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(10,37,64,.1);border-color:#5bb3e6\"><div style=\"width:46px;height:46px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin:0 auto 10px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"2\" width=\"14\" height=\"20\" rx=\"2\"><\u002Frect><path d=\"M12 18h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-weight:700;font-size:.9rem;color:#0a2540\">The MyWell app<\u002Fdiv><\u002Fbutton>\n        <button onclick=\"{{ goPeople }}\" style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;font-family:inherit;transition:.25s\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(10,37,64,.1);border-color:#5bb3e6\"><div style=\"width:46px;height:46px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin:0 auto 10px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 00-3-3.87\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-weight:700;font-size:.9rem;color:#0a2540\">People &amp; partners<\u002Fdiv><\u002Fbutton>\n        <button onclick=\"{{ goGame }}\" style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;font-family:inherit;transition:.25s\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(10,37,64,.1);border-color:#5bb3e6\"><div style=\"width:46px;height:46px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin:0 auto 10px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"5 3 19 12 5 21 5 3\"><\u002Fpolygon><\u002Fsvg><\u002Fdiv><div style=\"font-weight:700;font-size:.9rem;color:#0a2540\">Play the game<\u002Fdiv><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== ABOUT ===================== -->\n    <sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:26px;max-width:760px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">About MARVI<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">Managing Aquifer Recharge &amp; Sustaining Groundwater Use through Village-level Intervention.<\u002Fh2>\n        <p style=\"color:#566677;font-size:1.02rem\">MARVI's overall aim is to improve the security of irrigation water supplies and enhance livelihood opportunities for rural communities in India — by making the invisible visible at the village level.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:18px\">\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:24px\"><h3 style=\"font-size:1.05rem;color:#0a2540;margin-bottom:6px\">Participatory monitoring<\u002Fh3><p style=\"color:#566677;font-size:.93rem\">Build an effective groundwater-monitoring programme run by the village itself.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:24px\"><h3 style=\"font-size:1.05rem;color:#0a2540;margin-bottom:6px\">Better recharge<\u002Fh3><p style=\"color:#566677;font-size:.93rem\">Assess how well current rainwater-harvesting and recharge structures actually work.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:24px\"><h3 style=\"font-size:1.05rem;color:#0a2540;margin-bottom:6px\">Demand management<\u002Fh3><p style=\"color:#566677;font-size:.93rem\">Develop strategies that make everyday groundwater use sustainable.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(135deg,#0a2540,#0b5394);color:#fff;border-radius:18px;padding:30px;margin-bottom:18px\">\n        <h3 style=\"font-size:1.3rem;margin-bottom:8px\">A transdisciplinary approach<\u002Fh3>\n        <p style=\"color:#cfe3f3;font-size:.96rem\">MARVI brings together specialists in irrigation, hydrology, hydrogeology, social science, economics, agronomy, soil science and rural development — each working <em>beyond<\u002Fem> their own discipline to capture the whole problem and create new understanding of what is happening to groundwater. Modelling and assessment tools are designed to run reliably on easily available local information.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px\">\n        <div style=\"background:#e8f3fb;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"font-weight:800;color:#0a2540;margin-bottom:4px\">Aravali district, Gujarat<\u002Fdiv><div style=\"color:#566677;font-size:.9rem\">Hard-rock aquifer study area<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#e8f3fb;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"font-weight:800;color:#0a2540;margin-bottom:4px\">Udaipur district, Rajasthan<\u002Fdiv><div style=\"color:#566677;font-size:.9rem\">Hard-rock aquifer study area · active since Feb 2012<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:12px\"><h3 style=\"font-size:1.2rem;color:#0a2540\">Funded by<\u002Fh3><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px\">\n        <a href=\"https://waterpartnership.org.au/\" target=\"_blank\" rel=\"noopener\" style=\"flex:1 1 240px;text-decoration:none;background:linear-gradient(135deg,#0a2540,#0b5394);color:#fff;border-radius:13px;padding:18px 24px;transition:.25s\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 26px rgba(10,37,64,.25)\"><div style=\"font-weight:800;font-size:1rem\">Australian Water Partnership<\u002Fdiv><div style=\"font-size:.78rem;color:#cfe3f3;margin-top:3px\">Lead funder (AWP)<\u002Fdiv><\u002Fa>\n        <a href=\"https://www.aciar.gov.au/\" target=\"_blank\" rel=\"noopener\" style=\"flex:1 1 240px;text-decoration:none;background:linear-gradient(135deg,#0a2540,#0b5394);color:#fff;border-radius:13px;padding:18px 24px;transition:.25s\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 26px rgba(10,37,64,.25)\"><div style=\"font-weight:800;font-size:1rem\">ACIAR<\u002Fdiv><div style=\"font-size:.78rem;color:#cfe3f3;margin-top:3px\">Australian Centre for International Agricultural Research<\u002Fdiv><\u002Fa>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:12px\"><h3 style=\"font-size:1.2rem;color:#0a2540\">Delivered with partners<\u002Fh3><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px\">\n        <a href=\"https://www.westernsydney.edu.au/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">Western Sydney University<\u002Fa>\n        <a href=\"https://www.csiro.au/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">CSIRO Land &amp; Water<\u002Fa>\n        <a href=\"https://www.iwmi.cgiar.org/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">International Water Management Institute<\u002Fa>\n        <a href=\"https://www.dscindia.org/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">Development Support Centre<\u002Fa>\n        <a href=\"https://act-india.org/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">Arid Communities &amp; Technologies<\u002Fa>\n        <a href=\"https://www.mpuat.ac.in/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">Maharana Pratap Univ. of Agriculture &amp; Technology<\u002Fa>\n        <a href=\"https://vidyabhawan.org/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">Vidya Bhawan Krishi Vigyan Kendra<\u002Fa>\n        <a href=\"https://jalshakti-dowr.gov.in/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#fff;border:1px solid #dde8f1;border-radius:11px;padding:16px;font-weight:700;color:#0a2540;font-size:.85rem;transition:.25s\" style-hover=\"border-color:#5bb3e6;background:#e8f3fb\">Jal Shakti Ministry, Govt. of India<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== PEOPLE ===================== -->\n    <sc-if value=\"{{ isPeople }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:26px;max-width:700px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">Our People<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">The team behind MARVI.<\u002Fh2>\n        <p style=\"color:#566677;font-size:1.02rem\">Researchers, practitioners and village volunteers across Australia and India — working as one transdisciplinary team.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <sc-for list=\"{{ people }}\" as=\"grp\" hint-placeholder-count=\"9\">\n          <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px 24px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:14px;border-bottom:1px solid #eef4f9;padding-bottom:12px\">\n              <a href=\"{{ grp.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-weight:800;color:#0b5394;text-decoration:none;font-size:1.05rem\">{{ grp.org }}<\u002Fa>\n              <span style=\"color:#8aa0b3;font-size:.82rem;font-weight:600\">{{ grp.place }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ grp.members }}\" as=\"m\" hint-placeholder-count=\"4\">\n                <span style=\"display:inline-flex;align-items:center;gap:8px;background:#e8f3fb;border:1px solid #dde8f1;color:#0a2540;padding:8px 14px;border-radius:50px;font-size:.88rem;font-weight:600\"><span style=\"width:8px;height:8px;border-radius:50%;background:var(--accent,#c98a3a)\"><\u002Fspan>{{ m }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"background:linear-gradient(135deg,#0a2540,#0b5394);color:#fff;border-radius:16px;padding:24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap\">\n          <div style=\"font-size:2.4rem;font-weight:800;letter-spacing:-.03em\">35<\u002Fdiv>\n          <div><div style=\"font-weight:800;font-size:1.05rem\">Bhujal Jankaars in the field<\u002Fdiv><div style=\"color:#cfe3f3;font-size:.92rem\">25 in Rajasthan and 10 in Gujarat — the village water champions at the heart of MARVI.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== BHUJAL JANKAARS ===================== -->\n    <sc-if value=\"{{ isBjs }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:26px;max-width:720px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">Bhujal Jankaars (BJs)<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">The village's own groundwater champions.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:34px;align-items:center\">\n        <div>\n          <p style=\"color:#3a4b5c;font-size:1.05rem;margin-bottom:14px\"><strong style=\"color:#0a2540\">Bhujal Jankaar<\u002Fstrong> — Hindi भूजल जानकार, meaning \"groundwater informed\" — describes local volunteers who develop village-level science for community engagement and participatory groundwater management. It's a unique approach pioneered in the MARVI project.<\u002Fp>\n          <ul style=\"list-style:none;margin-top:6px\">\n            <li style=\"display:flex;gap:11px;margin-bottom:11px;font-size:.97rem;font-weight:500\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent,#c98a3a)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Monitor groundwater levels, rainfall, check-dam levels and water quality<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:11px;margin-bottom:11px;font-size:.97rem;font-weight:500\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent,#c98a3a)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Make sense of village recharge and availability from a local perspective<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:11px;margin-bottom:11px;font-size:.97rem;font-weight:500\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent,#c98a3a)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Share findings with farmers in their own language and help plan water use<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:11px;font-size:.97rem;font-weight:500\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent,#c98a3a)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Act as a trusted bridge to government agencies, NGOs and researchers<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <button onclick=\"{{ goMywell }}\" style=\"margin-top:18px;display:inline-flex;align-items:center;gap:8px;background:var(--accent,#c98a3a);color:#fff;padding:11px 20px;border-radius:8px;font-weight:700;font-size:.92rem;cursor:pointer;border:none;font-family:inherit;transition:.22s\" style-hover=\"filter:brightness(.92);transform:translateY(-1px)\">See the tool they use →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(135deg,#0b5394,#1f7bc4);color:#fff;border-radius:18px;padding:30px\">\n          <div style=\"font-size:2.6rem;line-height:1;margin-bottom:10px\">भूजल जानकार<\u002Fdiv>\n          <p style=\"color:#dbeafb;font-size:.98rem;margin:0\">With training and capacity building, BJs turn everyday observation into reliable local data — the foundation of community-led groundwater management.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== LEARN GROUNDWATER ===================== -->\n    <sc-if value=\"{{ isLearn }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:26px;max-width:760px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">Learn about Groundwater<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">Water beneath our feet.<\u002Fh2>\n        <p style=\"color:#566677;font-size:1.02rem\">Groundwater is the water that fills the spaces between soil, sand and rocks beneath the Earth's surface, stored in underground formations called aquifers. Across Asia, Africa, Australia and beyond, it's a critical source of water for drinking, farming and daily life.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:10px\"><h3 style=\"font-size:1.2rem;color:#0a2540\">🌱 Why groundwater matters<\u002Fh3><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:26px\">\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px\"><p style=\"color:#3a4b5c;font-size:.95rem;margin:0\">Supports agriculture, especially in dry regions and during low rainfall.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px\"><p style=\"color:#3a4b5c;font-size:.95rem;margin:0\">Provides safe drinking water to billions of people worldwide.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px\"><p style=\"color:#3a4b5c;font-size:.95rem;margin:0\">Maintains the flow of rivers, springs and wetlands in dry seasons.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:14px;padding:20px\"><p style=\"color:#3a4b5c;font-size:.95rem;margin:0\">Acts as natural storage, buffering droughts and climate change.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:26px\">\n        <div style=\"background:#e8f3fb;border:1px solid #dde8f1;border-radius:18px;padding:26px\">\n          <h3 style=\"font-size:1.15rem;color:#0a2540;margin-bottom:8px\">🌧️ How groundwater recharges<\u002Fh3>\n          <p style=\"color:#3a4b5c;font-size:.95rem;margin-bottom:10px\">Naturally, rain and snowmelt soak into the soil and move down to the aquifers. This can be boosted by local structures:<\u002Fp>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <span style=\"background:#fff;border:1px solid #dde8f1;color:#0a2540;padding:6px 12px;border-radius:50px;font-size:.82rem;font-weight:600\">Check dams &amp; percolation ponds<\u002Fspan>\n            <span style=\"background:#fff;border:1px solid #dde8f1;color:#0a2540;padding:6px 12px;border-radius:50px;font-size:.82rem;font-weight:600\">Farm bunds, trenches, recharge wells<\u002Fspan>\n            <span style=\"background:#fff;border:1px solid #dde8f1;color:#0a2540;padding:6px 12px;border-radius:50px;font-size:.82rem;font-weight:600\">Harvesting tanks &amp; spreading basins<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"color:#566677;font-size:.88rem;margin-top:12px\">This planned approach is called <strong style=\"color:#0a2540\">Managed Aquifer Recharge (MAR)<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:18px;padding:26px\">\n          <h3 style=\"font-size:1.15rem;color:#0a2540;margin-bottom:8px\">🚨 Challenges to sustainability<\u002Fh3>\n          <ul style=\"list-style:none;margin:0\">\n            <li style=\"display:flex;gap:10px;margin-bottom:9px;font-size:.94rem;color:#3a4b5c\"><span style=\"color:#c0392b;font-weight:800\">•<\u002Fspan>Overuse and unsustainable pumping<\u002Fli>\n            <li style=\"display:flex;gap:10px;margin-bottom:9px;font-size:.94rem;color:#3a4b5c\"><span style=\"color:#c0392b;font-weight:800\">•<\u002Fspan>Reduced recharge from land-use change &amp; climate variability<\u002Fli>\n            <li style=\"display:flex;gap:10px;margin-bottom:9px;font-size:.94rem;color:#3a4b5c\"><span style=\"color:#c0392b;font-weight:800\">•<\u002Fspan>Pollution from fertilisers, chemicals &amp; poor sanitation<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:.94rem;color:#3a4b5c\"><span style=\"color:#c0392b;font-weight:800\">•<\u002Fspan>Lack of monitoring and shared rules<\u002Fli>\n          <\u002Ful>\n          <p style=\"color:#566677;font-size:.88rem;margin-top:12px\">Depletion leads to dry wells, land subsidence and conflict over water.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(135deg,#0a2540,#0b5394);color:#fff;border-radius:18px;padding:30px\">\n        <h3 style=\"font-size:1.25rem;margin-bottom:10px\">🤝 What communities can do<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n          <div style=\"background:rgba(255,255,255,.1);border-radius:12px;padding:16px;font-size:.92rem;color:#eaf4fc\">Measure &amp; monitor levels and quality with tools like the MyWell app<\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.1);border-radius:12px;padding:16px;font-size:.92rem;color:#eaf4fc\">Improve recharge through local water harvesting and conservation<\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.1);border-radius:12px;padding:16px;font-size:.92rem;color:#eaf4fc\">Share water fairly within and across villages and regions<\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.1);border-radius:12px;padding:16px;font-size:.92rem;color:#eaf4fc\">Use wisely and protect groundwater from pollution and overuse<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MYWELL APP ===================== -->\n    <sc-if value=\"{{ isMywell }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:26px;max-width:760px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">About the MyWell App<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">MyWell — making groundwater visible.<\u002Fh2>\n        <p style=\"color:#566677;font-size:1.02rem\">Groundwater is a hidden resource, easy to overlook because it lies beneath our feet. MyWell brings this invisible lifeline to the surface — turning local observations into clear, visual information that supports better decisions on how water is used and shared.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.2fr .8fr;gap:24px;align-items:start;margin-bottom:22px\">\n        <div>\n          <p style=\"color:#3a4b5c;font-size:1rem;margin-bottom:12px\">Developed through the MARVI project, MyWell helps Bhujal Jaankaars and community members report groundwater and related data. Once uploaded, it's stored online and made available for village-level, regional and broader water management. The app crowdsources data from a wide network of trained volunteers and citizens, showing current status plus historical trends and village-level comparisons.<\u002Fp>\n          <p style=\"color:#3a4b5c;font-size:1rem;margin:0\">It is a <strong style=\"color:#0a2540\">public-domain, non-profit tool<\u002Fstrong> that can be used globally.<\u002Fp>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:16px\">\n            <span style=\"background:#e8f3fb;border:1px solid #dde8f1;color:#0a2540;padding:7px 14px;border-radius:50px;font-size:.84rem;font-weight:700\">Engage farmers &amp; schools<\u002Fspan>\n            <span style=\"background:#e8f3fb;border:1px solid #dde8f1;color:#0a2540;padding:7px 14px;border-radius:50px;font-size:.84rem;font-weight:700\">Collect, access &amp; share<\u002Fspan>\n            <span style=\"background:#e8f3fb;border:1px solid #dde8f1;color:#0a2540;padding:7px 14px;border-radius:50px;font-size:.84rem;font-weight:700\">Self-manage at village level<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ goHowto }}\" style=\"margin-top:18px;display:inline-flex;align-items:center;gap:8px;background:var(--accent,#c98a3a);color:#fff;padding:11px 20px;border-radius:8px;font-weight:700;font-size:.92rem;cursor:pointer;border:none;font-family:inherit;transition:.22s\" style-hover=\"filter:brightness(.92);transform:translateY(-1px)\">How to use MyWell →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\">\n          <div style=\"font-weight:800;color:#0a2540;margin-bottom:12px\">📊 Key uses<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:.9rem;border-bottom:1px solid #eef4f9;padding-bottom:6px\"><span style=\"color:#3a4b5c\">Depth to groundwater<\u002Fspan><span style=\"color:#0b5394;font-weight:700\">visualise<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:.9rem;border-bottom:1px solid #eef4f9;padding-bottom:6px\"><span style=\"color:#3a4b5c\">Rainfall amount<\u002Fspan><span style=\"color:#0b5394;font-weight:700\">visualise<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:.9rem;border-bottom:1px solid #eef4f9;padding-bottom:6px\"><span style=\"color:#3a4b5c\">Check-dam water level<\u002Fspan><span style=\"color:#0b5394;font-weight:700\">visualise<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:.9rem\"><span style=\"color:#3a4b5c\">Water-quality parameters<\u002Fspan><span style=\"color:#0b5394;font-weight:700\">visualise<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-weight:700;color:#566677;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px\">Also collects<\u002Fdiv>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n            <span style=\"background:#e8f3fb;color:#0a2540;padding:5px 11px;border-radius:50px;font-size:.78rem;font-weight:600\">River flow &amp; depth<\u002Fspan>\n            <span style=\"background:#e8f3fb;color:#0a2540;padding:5px 11px;border-radius:50px;font-size:.78rem;font-weight:600\">Spring discharge<\u002Fspan>\n            <span style=\"background:#e8f3fb;color:#0a2540;padding:5px 11px;border-radius:50px;font-size:.78rem;font-weight:600\">Rainwater-tank level<\u002Fspan>\n            <span style=\"background:#e8f3fb;color:#0a2540;padding:5px 11px;border-radius:50px;font-size:.78rem;font-weight:600\">Reservoir level<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#f0f6fc;border:1px solid #dde8f1;border-radius:16px;padding:22px 24px\">\n        <div style=\"font-weight:800;color:#0a2540;margin-bottom:12px\">🛠️ Design, development &amp; support<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;font-size:.9rem;color:#3a4b5c\">\n          <div><div style=\"font-weight:700;color:#0b5394;margin-bottom:3px\">Development<\u002Fdiv>v2 — Lewis Daley &amp; Basant Maheshwari (2015–21); v3 — Basant Maheshwari &amp; Deepak Patidar (2022); v4 — Basant Maheshwari, Sahil Chandel, Nitu Sharma &amp; Deepak Patidar<\u002Fdiv>\n          <div><div style=\"font-weight:700;color:#0b5394;margin-bottom:3px\">Deployment (WSU server)<\u002Fdiv>David Wichert, Michael Macken, Michael Reolon, Seema Deshmukh<\u002Fdiv>\n          <div><div style=\"font-weight:700;color:#0b5394;margin-bottom:3px\">Financial support<\u002Fdiv>Australian Water Partnership &amp; ACIAR, Canberra<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== HOW TO USE MYWELL ===================== -->\n    <sc-if value=\"{{ isHowto }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:24px;max-width:720px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">How to use MyWell<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">Get started in four simple steps.<\u002Fh2>\n        <p style=\"color:#566677;font-size:1.02rem\">Your first action is to register as a user of the MyWell app. Then you're ready to record and explore water data.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #dde8f1;border-left:5px solid var(--accent,#c98a3a);border-radius:14px;padding:16px 20px;margin-bottom:22px\">\n        <div style=\"flex-shrink:0;width:40px;height:40px;border-radius:11px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div style=\"font-size:.96rem;color:#3a4b5c\"><strong style=\"color:#0a2540\">Register first.<\u002Fstrong> Sign up as a MyWell user — it only takes a minute.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:22px\">\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"font-size:1.6rem;font-weight:800;color:#0b5394;letter-spacing:-.03em\">1<\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin:6px 0 5px\">The main screen<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">Eight options — Well, Rainfall, Check dam, Water quality, River, Spring, Rainwater tank, Reservoir. Each opens a simple input form.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"font-size:1.6rem;font-weight:800;color:#0b5394;letter-spacing:-.03em\">2<\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin:6px 0 5px\">Register &amp; add data<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">Add a reading with the pencil icon, scan a QR code, or browse stations. Star your station to keep it handy.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"font-size:1.6rem;font-weight:800;color:#0b5394;letter-spacing:-.03em\">3<\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin:6px 0 5px\">Browse the map<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">See every station on a live map and filter with the + symbol — the collective effort of communities across India.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"font-size:1.6rem;font-weight:800;color:#0b5394;letter-spacing:-.03em\">4<\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin:6px 0 5px\">Plot &amp; zoom<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">Visualise trends over time and drag the sliders to zoom — spotting seasonal patterns, recharge and depletion.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:linear-gradient(135deg,#0a2540,#0b5394);border-radius:16px;padding:22px 26px\">\n        <div style=\"flex:1 1 300px;color:#cfe3f3;font-size:.98rem\">Want the detailed, illustrated walkthrough with app mock-ups for every step?<\u002Fdiv>\n        <a href=\"how-to-use-mywell.html\" style=\"display:inline-flex;align-items:center;gap:8px;background:var(--accent,#c98a3a);color:#fff;text-decoration:none;padding:12px 22px;border-radius:8px;font-weight:700;font-size:.94rem;transition:.22s\" style-hover=\"filter:brightness(.92);transform:translateY(-1px)\">Open the full guide →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== GAME ===================== -->\n    <sc-if value=\"{{ isGame }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:38px 22px 56px\">\n      <div style=\"margin-bottom:24px;max-width:760px\">\n        <span style=\"color:var(--accent,#c98a3a);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;margin-bottom:10px;display:block\">MARVI Groundwater Game<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.5rem,3.2vw,2.1rem);color:#0a2540;margin-bottom:10px\">Share a well. Survive the year. Learn the trade-offs.<\u002Fh2>\n        <p style=\"color:#566677;font-size:1.02rem\">An interactive game where a whole village draws from one shared well. Play through the watering turns of the year and feel first-hand why cooperative groundwater management matters.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-radius:18px;overflow:hidden;border:1px solid #dde8f1;box-shadow:0 18px 44px rgba(10,37,64,.14);background:#0a2540;margin-bottom:24px\">\n        <div style=\"display:flex;align-items:center;gap:7px;padding:10px 14px;background:#0a2540\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#ff5f57\"><\u002Fspan>\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#febc2e\"><\u002Fspan>\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#28c840\"><\u002Fspan>\n          <span style=\"color:#9fb3c4;font-size:.78rem;font-weight:600;margin-left:8px\">MARVI Groundwater Game<\u002Fspan>\n        <\u002Fdiv>\n        <img src=\"89215473-58c4-4351-8319-45bef3144e77\" alt=\"MARVI Groundwater Game — the village well sits at 46.0 (low) after the monsoon, while players decide which crops to water this turn\" style=\"width:100%;display:block\">\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:22px\">\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"width:44px;height:44px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin-bottom:12px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 00-3-3.87\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin-bottom:5px\">One shared well<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">The village agrees on a plan together — every player's choices affect everyone's water.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"width:44px;height:44px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin-bottom:12px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v20\"><\u002Fpath><path d=\"M12 7c-3-3-7-2-7-2s-1 4 2 7\"><\u002Fpath><path d=\"M12 11c3-3 7-2 7-2s1 4-2 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin-bottom:5px\">Choose your waterings<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">Each turn, decide yes or no for high-, moderate- and low-water crops. Every watering draws the well down.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #dde8f1;border-radius:16px;padding:22px\"><div style=\"width:44px;height:44px;border-radius:12px;background:#e8f3fb;display:flex;align-items:center;justify-content:center;color:#0b5394;margin-bottom:12px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M7 14l3-3 3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-size:1.05rem;color:#0a2540;margin-bottom:5px\">Watch the watertable<\u002Fh3><p style=\"color:#566677;font-size:.92rem\">Starting just after the monsoon, balance thirsty crops against a falling well across five years.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:#e8f3fb;border:1px solid #dde8f1;border-radius:16px;padding:20px 24px\">\n        <div style=\"flex:1 1 300px;color:#3a4b5c;font-size:.96rem\">The game is a hands-on companion to MARVI's water-literacy work — turning the science of groundwater into a decision every player can feel.<\u002Fdiv>\n        <button onclick=\"{{ goLearn }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:var(--accent,#c98a3a);color:#fff;padding:11px 20px;border-radius:8px;font-weight:700;font-size:.92rem;cursor:pointer;border:none;font-family:inherit;transition:.22s\" style-hover=\"filter:brightness(.92);transform:translateY(-1px)\">Learn the groundwater basics →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"background:#13212e;color:#9fb3c4;padding:28px 0;font-size:.85rem\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;align-items:center\">\n      <div style=\"display:flex;align-items:center;gap:10px;color:#fff;font-weight:800\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 40 40\" fill=\"none\"><circle cx=\"20\" cy=\"20\" r=\"19\" fill=\"#1f7bc4\"><\u002Fcircle><path d=\"M20 8c5 6 8 10 8 15a8 8 0 11-16 0c0-5 3-9 8-15z\" fill=\"#5bb3e6\"><\u002Fpath><\u002Fsvg>MARVI<\u002Fdiv>\n      <span>© 2025 MARVI Project · Rajasthan &amp; Gujarat, India<\u002Fspan>\n      <a href=\"https://www.marvi.org.in/welcome-to-marvi\" target=\"_blank\" rel=\"noopener\" style=\"color:#9fb3c4;text-decoration:none;font-weight:700\">marvi.org.in ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#c98a3a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#c98a3a&quot;,&quot;#0b5394&quot;,&quot;#1f8a5b&quot;,&quot;#7a5cd0&quot;],&quot;section&quot;:&quot;Style&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { tab: 'home' };\n\n  go(id) {\n    this.setState({ tab: id });\n    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  renderVals() {\n    const accent = this.props.accent ?? '#c98a3a';\n    const t = this.state.tab;\n    const nb = 'flex:0 0 auto;background:none;border:none;cursor:pointer;font-family:inherit;padding:12px 13px;font-size:.88rem;font-weight:700;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;';\n    const items = [\n      ['home', 'Home'], ['about', 'About'], ['people', 'Our People'],\n      ['bjs', 'Bhujal Jankaars'], ['learn', 'Groundwater'], ['mywell', 'MyWell App'],\n      ['howto', 'Use MyWell'], ['game', 'Game']\n    ];\n    const tabs = items.map(([id, label]) => ({\n      id, label,\n      style: nb + (t === id ? ('color:#0b5394;border-bottom-color:' + accent + ';') : 'color:#566677;'),\n      onClick: () => this.go(id)\n    }));\n\n    const people = [\n      { org: 'Western Sydney University', place: 'Penrith, Australia', url: 'https://www.westernsydney.edu.au/', members: ['Prof. Basant Maheshwari', 'A/Prof. Maria Varua', 'Adj A/Prof. Roger Packham', 'Dr Dharma Hagare', 'Dr Harsharn Grewal (Retired)', 'Mrs Joycelyn Applebee', 'Dr Michael Chew', 'Mr Lewis Daley'] },\n      { org: 'CSIRO Land & Water', place: 'Adelaide, Australia', url: 'https://www.csiro.au/', members: ['Dr Peter Dillon', 'Dr Rai Kookana'] },\n      { org: 'International Water Management Institute', place: 'Colombo, Sri Lanka', url: 'https://www.iwmi.cgiar.org/', members: ['Dr Tushaar Shah', 'Dr S. Prathapar', 'Dr Pennan Chinnasamy'] },\n      { org: 'Arid Communities and Technologies', place: 'Bhuj, India', url: 'https://act-india.org/', members: ['Dr Yogesh Jadeja', 'Mr Jayanti Gorasiya', 'Mr Brijen Thakar'] },\n      { org: 'Development Support Centre', place: 'Ahmedabad, India', url: 'https://www.dscindia.org/', members: ['Mr Mohan Sharma', 'Mr Sachin Oza', 'Mr Ketan Gohil', 'Mr Nandlal Menat'] },\n      { org: 'Maharana Pratap University of Agriculture & Technology', place: 'Udaipur, India', url: 'https://www.mpuat.ac.in/', members: ['Dr P.K. Singh', 'Dr Mahesh Kothari', 'Dr K.K. Yadav', 'Dr Ramesh Purohit (Retired)'] },\n      { org: 'Vidya Bhawan Krishi Vigyan Kendra', place: 'Udaipur, India', url: 'https://vidyabhawan.org/', members: ['Dr Praful Bhatnagar', 'Mr Hasmukh Gehlot', 'Mr Prahlad Soni'] },\n      { org: 'Vidya Bhawan Polytechnic College', place: 'Udaipur, India', url: 'https://vidyabhawan.in/', members: ['Dr Anil Mehta', 'Dr Yogita Dashora'] },\n      { org: 'Mekong Region Futures Institute', place: 'Laos', url: 'https://www.merfi.org/', members: ['Dr John Ward'] }\n    ];\n\n    return {\n      accent, tabs, people,\n      isHome: t === 'home', isAbout: t === 'about', isPeople: t === 'people',\n      isBjs: t === 'bjs', isLearn: t === 'learn', isMywell: t === 'mywell',\n      isHowto: t === 'howto', isGame: t === 'game',\n      goHome: () => this.go('home'), goGame: () => this.go('game'), goAbout: () => this.go('about'),\n      goLearn: () => this.go('learn'), goMywell: () => this.go('mywell'), goBjs: () => this.go('bjs'),\n      goPeople: () => this.go('people'), goHowto: () => this.go('howto')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
